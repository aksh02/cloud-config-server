eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8762/eureka/
  instance:
    hostname: localhost

microservice:
    order-service:
        endpoints:
          endpoint:
            uri: http://ORDER-SERVICE/order/bookorder
    payment-service:
        endpoints:
          endpoint:
            uri: http://PAYMENT-SERVICE/payments/bookpayment

